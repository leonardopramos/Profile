<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links Pessoais</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button id="language-switch" type="button" onclick="toggleLanguage()">
      EN
    </button>
    <div id="container">
      <div id="profile">
        <img
          src="./assets/Avatar.png"
          data-i18n-alt="profileAlt"
          alt="Foto de Leonardo Ramos sorrindo, usando um terno preto com camisa e gravata azul, com árvores de fundo."
        />
        <p>@leonardo.pramos</p>
      </div>
      <div id="switch" onclick="toggleMode()">
        <button></button>
        <span></span>
      </div>

      <ul>
        <li>
          <a
            href="https://github.com/leonardopramos"
            target="_blank"
            data-i18n="portfolio"
            >Portfólio
          </a>
        </li>
        <li>
          <a
            id="resume-link"
            href="./files/curriculo-leonardo-preczevski-ramos.pdf"
            data-i18n="resume"
            >Download do Currículo em PDF</a
          >
        </li>
        <li>
          <a
            href="mailto:leonardopreczevskiramos@gmail.com"
            target="_blank"
            data-i18n="contact"
            >Contato</a
          >
        </li>
      </ul>
      <div id="social-media">
        <a href="https://github.com/leonardopramos" target="_blank">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a
          href="https://www.linkedin.com/in/leonardo-preczevski-733501215/"
          target="_blank"
        >
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
        <a href="https://www.instagram.com/leonardo.pramos/" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>
      </div>
      <footer>
        <span data-i18n="footerPrefix">Projeto feito a partir do Discover</span>
        <a href="https://www.rocketseat.com.br/discover" target="_blank"
          >RocketSeat</a
        >
      </footer>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
